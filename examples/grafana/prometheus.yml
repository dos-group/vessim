global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  # Scrape vessim's own /metrics endpoint (exported by the Api controller)
  - job_name: "vessim"
    static_configs:
      - targets: ["host.docker.internal:8700"]
