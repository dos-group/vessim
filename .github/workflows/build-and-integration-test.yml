name: Build

on:
  workflow_dispatch:
  pull_request:
    branches:
    - main

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.9, 3.13]

    steps:
    - uses: actions/checkout@v4

    # The Python wheel force-includes vessim/_viewer_dist (see pyproject.toml),
    # so the viewer must be built before `uv build` is invoked.
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm
        cache-dependency-path: viewer/package-lock.json

    - name: Install viewer dependencies
      run: npm ci
      working-directory: viewer

    - name: Build viewer
      run: npm run build
      working-directory: viewer

    - name: Copy viewer dist into package
      run: rm -rf vessim/_viewer_dist && cp -r viewer/dist vessim/_viewer_dist

    - name: Install uv and set python version to ${{ matrix.python-version }}
      uses: astral-sh/setup-uv@v5
      with:
        python-version: ${{ matrix.python-version }}
        enable-cache: true

    # build package
    - name: Build package
      run: uv build

    # install package
    - name: Install package
      run: uv pip install dist/*.tar.gz
