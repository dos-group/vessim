name: Build

on:
  workflow_dispatch:
  workflow_call:
  pull_request:
    branches:
    - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm
        cache-dependency-path: viewer/package-lock.json

    - name: Install viewer dependencies
      run: npm ci
      working-directory: viewer

    - name: Build viewer
      run: npm run build
      working-directory: viewer

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Build package
      run: uv build

    - name: Upload dist
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/
